<aside class="sidebar">
    <nav class="sidebar-nav">
        <ul>
            {% for item in site.sidebar %}
                <li>
                    <a href="{{ item.url | relative_url }}"
                       class="{% if page.url == item.url %}active{% endif %}">
                        {{ item.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </nav>
</aside>
